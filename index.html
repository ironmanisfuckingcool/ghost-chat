<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GHOST-CORD // V6_STABLE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #313338; --sidebar: #2b2d31; --nav: #1e1f22; --accent: #5865f2; --text: #dbdee1; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; height: 100vh; }
        #auth { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px; }
        .card { background: var(--bg); padding: 30px; border-radius: 8px; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1e1f22; border: none; color: #fff; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 5px 0; color: #fff; }
        .host-btn { background: var(--accent); }
        .join-btn { background: #4e5058; }
        #chat-main { flex-grow: 1; display: flex; flex-direction: column; visibility: hidden; }
        #msgs { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #383a40; padding: 10px; border-radius: 8px; width: fit-content; max-width: 80%; }
        .input-box { padding: 20px; background: var(--bg); }
        #msgInput { background: #383a40; }
    </style>
</head>
<body>

<div id="auth">
    <div class="card">
        <h2>GHOST-CORD V6</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="text" id="invite" placeholder="Invite Code (Ex: MySecretRoom)">
        <p style="font-size: 12px; color: #949ba4;">One person clicks HOST, everyone else clicks JOIN using the SAME code.</p>
        <button class="btn host-btn" onclick="start('host')">CREATE ROOM (HOST)</button>
        <button class="btn join-btn" onclick="start('join')">JOIN ROOM</button>
    </div>
</div>

<div style="width: 72px; background: var(--nav);"></div>
<div id="chat-main">
    <div id="msgs"></div>
    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Message Group..." onkeypress="if(event.key==='Enter') send()">
    </div>
</div>

<script>
    let peer, conn, myUser, roomCode, cryptoKey;
    let connections = [];

    async function start(mode) {
        myUser = document.getElementById('username').value;
        roomCode = document.getElementById('invite').value.trim();
        if(!myUser || !roomCode) return alert("Fill everything in!");

        // 1. Setup Encryption (Invite Code = Password)
        const enc = new TextEncoder();
        const keyMat = await crypto.subtle.importKey("raw", enc.encode(roomCode), "PBKDF2", false, ["deriveKey"]);
        cryptoKey = await crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: enc.encode("ghost-v6"), iterations: 100000, hash: "SHA-256" },
            keyMat, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
        );

        // 2. Initialize Network
        // HOST uses the exact roomCode. JOINER uses a random ID.
        const peerId = (mode === 'host') ? roomCode : null;
        peer = new Peer(peerId, { config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]} });

        peer.on('open', (id) => {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('chat-main').style.visibility = 'visible';
            addMsg("SYSTEM", `Online as ${myUser}. Mode: ${mode.toUpperCase()}`);
            
            if(mode === 'join') {
                const c = peer.connect(roomCode);
                setupConn(c);
            }
        });

        peer.on('connection', (c) => setupConn(c));
        
        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') alert("This Invite Code is already being HOSTED. Try clicking JOIN instead!");
            else console.error(err);
        });
    }

    function setupConn(c) {
        c.on('open', () => {
            if(!connections.find(x => x.peer === c.peer)) connections.push(c);
            c.on('data', async (data) => {
                const dec = await decryptMsg(data.payload, data.iv);
                addMsg(data.user, dec);
                // If I'm the host, relay to everyone else
                if(peer.id === roomCode) {
                    connections.forEach(other => { if(other.peer !== c.peer) other.send(data); });
                }
            });
        });
    }

    async function send() {
        const val = document.getElementById('msgInput').value;
        if(!val) return;
        const { payload, iv } = await encryptMsg(val);
        const packet = { user: myUser, payload, iv };
        connections.forEach(c => c.send(packet));
        addMsg("You", val);
        document.getElementById('msgInput').value = "";
    }

    function addMsg(u, t) {
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<strong>${u}</strong>: ${t}`;
        document.getElementById('msgs').appendChild(div);
        document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
    }

    async function encryptMsg(t) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const p = await crypto.subtle.encrypt({name:"AES-GCM", iv}, cryptoKey, new TextEncoder().encode(t));
        return { payload: p, iv };
    }

    async function decryptMsg(p, iv) {
        try {
            const d = await crypto.subtle.decrypt({name:"AES-GCM", iv}, cryptoKey, p);
            return new TextDecoder().decode(d);
        } catch(e) { return "[ENCRYPTION ERROR]"; }
    }
</script>
</body>
</html>
